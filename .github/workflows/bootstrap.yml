name: Bootstrap Historical Data

on:
  workflow_dispatch:
    inputs:
      months_back:
        description: 'How many months of history to download (default 14)'
        required: false
        default: '14'

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas numpy pyarrow requests

      - name: Download Historical Bhavcopy
        run: |
          export MONTHS_BACK=${{ github.event.inputs.months_back }}
          python src/00_bootstrap_historical.py

      - name: Build DB
        run: |
          python src/01_consolidate_csv.py
          python src/02_filter_eq.py
          python src/03_find_ath.py

      - name: Run Signals
        run: python src/04_run_daily_signals.py

      - name: Build Dashboard
        run: python src/05_build_dashboard.py

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bhav_data/ db/ output/ docs/
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "bootstrap: $(date +'%d-%b-%Y') -- $(ls bhav_data/*.csv 2>/dev/null | wc -l) files"
          git pull --rebase origin main || true
          git push origin HEAD:main
