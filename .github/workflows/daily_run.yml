name: NSE BTST Daily Signals

on:
  schedule:
    - cron: '30 11 * * 1-5'   # 5:00 PM IST = 11:30 UTC Mon-Fri
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy requests pyarrow openpyxl

      - name: Download today's bhavcopy
        run: python src/nse_bhavcopy_fetch.py

      - name: Step 1 - Consolidate bhavcopy data
        run: python src/01_consolidate_csv.py

      - name: Cleanup raw bhav CSVs (keep repo small)
        run: |
          find bhav_data/ -name "*.csv" -delete || true
          echo "Bhav CSVs removed"

      - name: Step 2 - Filter EQ data
        run: python src/02_filter_eq.py

      - name: Step 3 - Compute ATH
        run: python src/03_find_ath.py

      - name: Step 4 - Run daily signals (today only)
        run: python src/04_run_daily_signals.py

      - name: Step 5 - Run simulation & generate per-config JSON files
        run: python src/05_run_simulation.py

      - name: Fetch latest Nifty index data
        run: |
          mkdir -p docs/data
          curl -sf "https://spurandhar0.github.io/nse-btst-dashboard/nifty_index.json" \
            -o docs/data/nifty_index.json \
            && echo "Fetched nifty_index.json" \
            || echo "Failed to fetch nifty_index.json (using existing)"

      - name: Step 6 - Build dashboard
        run: python src/05_build_dashboard.py

      - name: Push dashboard to public repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          cd /tmp
          git clone https://x-access-token:${GH_PAT}@github.com/spurandhar0/nse-btst-signals-dashboard-v2.git pub-dashboard
          mkdir -p pub-dashboard/docs/data

          # index.html — always required
          cp $GITHUB_WORKSPACE/docs/index.html pub-dashboard/docs/index.html

          # sim_results per-config JSON files (MTF filtered, one per config)
          for cfg_file in $GITHUB_WORKSPACE/docs/data/sim_results_C*.json; do
            [ -f "$cfg_file" ] && cp "$cfg_file" pub-dashboard/docs/data/ || true
          done

          # sim_meta.json — metadata (generated_at, last_date, config list)
          [ -f "$GITHUB_WORKSPACE/docs/data/sim_meta.json" ] \
            && cp $GITHUB_WORKSPACE/docs/data/sim_meta.json pub-dashboard/docs/data/sim_meta.json \
            || echo "sim_meta.json not found — skipping"

          # trade_ohlc.json — safe copy
          [ -f "$GITHUB_WORKSPACE/docs/data/trade_ohlc.json" ] \
            && cp $GITHUB_WORKSPACE/docs/data/trade_ohlc.json pub-dashboard/docs/data/trade_ohlc.json \
            || echo "trade_ohlc.json not found — skipping"

          # nifty_index.json — optional
          [ -f "$GITHUB_WORKSPACE/docs/data/nifty_index.json" ] \
            && cp $GITHUB_WORKSPACE/docs/data/nifty_index.json pub-dashboard/docs/data/nifty_index.json \
            || true

          cd pub-dashboard
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet && echo "Nothing to push to public repo" || git commit -m "Dashboard update: $(date +'%Y-%m-%d')"
          git push origin main

      - name: Commit private repo data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Pull remote changes FIRST (before staging) to avoid rebase conflicts
          git fetch origin
          git rebase origin/main || (git rebase --abort && git merge -X theirs origin/main) || true
          # Stage only needed files — never XLSX (kept out by output/.gitignore)
          git add bhav_data/ db/ docs/data/ || true
          find output/ -maxdepth 3 \( -name "*.csv" -o -name "*.json" -o -name ".gitignore" \) | xargs git add 2>/dev/null || true
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "Daily signals + simulation: $(date +'%Y-%m-%d')"
          git push origin HEAD:main
