name: Historical Backfill (Run Once)

# This workflow is now superseded by "Generate Signals (Historical Backfill)"
# which has better options. Use that one instead.
# This remains here for reference and backward compat.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas numpy requests pyarrow openpyxl

      - name: Step 1 – Consolidate bhavcopy data
        run: python src/01_consolidate_csv.py

      - name: Step 2 – Filter EQ data
        run: python src/02_filter_eq.py

      - name: Step 3 – Compute ATH
        run: python src/03_find_ath.py

      - name: Step 4 – Historical signal backfill (Jan 2025 → today)
        run: python src/00b_historical_backfill.py
        env:
          SIGNAL_START_DATE: '2025-01-01'

      - name: Step 5 – Run simulation & generate Excel files
        run: python src/05_run_simulation.py

      - name: Step 6 – Build dashboard HTML
        run: python src/05_build_dashboard.py

      - name: Commit and push all data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add db/ output/ docs/index.html docs/data/ || true
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "Backfill complete: signals + simulation + dashboard $(date +'%Y-%m-%d')"
          git pull --rebase origin main || true
          git push origin HEAD:main
