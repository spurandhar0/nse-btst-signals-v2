name: Validate & Backfill NSE Bhav Data

# ─── PURPOSE (FAST MODE) ────────────────────────────────────────────────────
# Every Saturday 10 AM IST after market close:
#   1. Download missing bhav copies for trading days (2025-01-01 → today)
#   2. Validate ONLY symbols from actual trading signals (sim_results_C*.json)
#   3. Skip MTF watchlist validation (1,600+ symbols) — was wasteful
#   4. Check for OHLC gaps per config symbol
#   5. Fill gaps via NSE API, only for symbols with trades
#
# PERFORMANCE: ~90% faster (seconds vs minutes) — focuses on actual used symbols
# FULLY SELF-CONTAINED: uses only GITHUB_TOKEN (built-in, no external PAT).
# ────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    # 5:30 PM IST = 12:00 UTC  — runs after NSE closes at 3:30 PM IST
    - cron: '30 4 * * 6'
  workflow_dispatch:
    inputs:
      from_date:
        description: 'Validate from date YYYY-MM-DD (default 2025-01-01)'
        required: false
        default: '2025-01-01'
      force_recheck:
        description: 'Recheck even already-downloaded dates? (true/false)'
        required: false
        default: 'false'

permissions:
  contents: write   # GITHUB_TOKEN can push to THIS repo — no PAT needed

jobs:
  validate-and-backfill:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 360   # up to 6h — handles 500+ symbols, full historical backfill

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so we can commit cleanly
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python ────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy requests pyarrow openpyxl

      # ── 3. Validate + auto-backfill ──────────────────────────────────────
      - name: Validate bhav data and fill gaps
        env:
          FROM_DATE:      ${{ github.event.inputs.from_date || '2025-01-01' }}
          FORCE_RECHECK:  ${{ github.event.inputs.force_recheck || 'false' }}
        run: python src/validate_and_backfill.py

      # ── 4. Rebuild derived layers if anything changed ────────────────────
      - name: Rebuild derived DB layers (filter / ATH)
        run: |
          python src/02_filter_eq.py
          python src/03_find_ath.py

      # ── 5. Commit gaps-filled data back to THIS repo ─────────────────────
      - name: Commit validated bhav data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bhav_data/ db/ || true
          git diff --staged --quiet \
            && echo "Nothing new — all data already complete ✓" \
            || git commit -m "auto: bhav validate+backfill $(date +'%Y-%m-%d')"
          git push origin HEAD:main
